<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h3>Test Form</h3>
                    </div>
                    <div class="card-body">
                        <form id="testForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="firstName" class="form-label">Ad *</label>
                                    <input type="text" class="form-control" id="firstName" name="firstName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="lastName" class="form-label">Soyad *</label>
                                    <input type="text" class="form-control" id="lastName" name="lastName" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">E-posta *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">Telefon *</label>
                                    <input type="tel" class="form-control" id="phone" name="phone" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="educationLevel" class="form-label">Eğitim Seviyesi</label>
                                    <select class="form-select" id="educationLevel" name="educationLevel" required>
                                        <option value="">Seçiniz</option>
                                        <option value="bachelor">Lisans</option>
                                        <option value="master">Yüksek Lisans</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="country" class="form-label">Ülke</label>
                                    <select class="form-select" id="country" name="country" required>
                                        <option value="">Seçiniz</option>
                                        <option value="germany">Almanya</option>
                                        <option value="italy">İtalya</option>
                                        <option value="czech">Çek Cumhuriyeti</option>
                                        <option value="austria">Avusturya</option>
                                        <option value="uk">İngiltere</option>
                                        <option value="poland">Polonya</option>
                                        <option value="hungary">Macaristan</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="program" class="form-label">Program Alanı</label>
                                    <select class="form-select" id="program" name="program" required>
                                        <option value="">Seçiniz</option>
                                        <option value="engineering">Mühendislik</option>
                                        <option value="business">İşletme</option>
                                        <option value="medicine">Tıp</option>
                                        <option value="arts">Sanat</option>
                                        <option value="social">Sosyal Bilimler</option>
                                        <option value="natural">Doğa Bilimleri</option>
                                        <option value="computer">Bilgisayar Bilimi</option>
                                        <option value="language">Dil Eğitimi</option>
                                        <option value="other">Diğer</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="budget" class="form-label">Bütçe Aralığı</label>
                                    <select class="form-select" id="budget" name="budget" required>
                                        <option value="">Seçiniz</option>
                                        <option value="low">5,000 - 15,000 €</option>
                                        <option value="medium">15,000 - 30,000 €</option>
                                        <option value="high">30,000+ €</option>
                                    </select>
                                </div>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-search me-2"></i>
                                    Test Et
                                </button>
                            </div>
                        </form>
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('testForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const data = Object.fromEntries(formData);
        
        console.log('Form verileri:', data);
        
        const submitBtn = this.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Gönderiliyor...';
        submitBtn.disabled = true;
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '';
        
        try {
            console.log('API\'ye gönderiliyor:', JSON.stringify(data));
            const response = await fetch('/api/assessment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            console.log('API yanıtı:', response.status);
            const result = await response.json();
            console.log('API sonucu:', result);
            
            if (result.success) {
                resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle me-2"></i>
                        <strong>${result.message}</strong>
                    </div>
                `;
                this.reset();
            } else {
                resultDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>${result.error}</strong>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Form gönderme hatası:', error);
            resultDiv.innerHTML = `
                <div class="alert alert-danger">
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    <strong>Bağlantı hatası. Lütfen tekrar deneyin.</strong>
                </div>
            `;
        } finally {
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });
    </script>
</body>
</html>
